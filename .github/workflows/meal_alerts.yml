name: Meal Time Alerts

on:
  schedule:
    # 2분 전 켜지도록 수정 (목표 시간: 아침 07:20 / 평일점심 11:20 / 주말점심 11:40 / 저녁 17:20)
    - cron: '18 22 * * 0-4'  # 평일 아침 (KST 07:18 트리거 -> 07:20까지 2분 대기)
    - cron: '18 2 * * 1-5'   # 평일 점심 (KST 11:18 트리거 -> 11:20까지 2분 대기)
    - cron: '38 2 * * 6,0'   # 주말 점심 (KST 11:38 트리거 -> 11:40까지 2분 대기)
    - cron: '18 8 * * *'     # 매일 저녁 (KST 17:18 트리거 -> 17:20까지 2분 대기)

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pytz

      - name: Determine Meal Type and Run
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          HOUR=$(date +%H)
          if [ "$HOUR" -eq 22 ] || [ "$HOUR" -eq 21 ]; then
            python scripts/main.py 아침 $WEBHOOK_URL
          elif [ "$HOUR" -eq 2 ] || [ "$HOUR" -eq 1 ]; then
            python scripts/main.py 점심 $WEBHOOK_URL
          elif [ "$HOUR" -eq 8 ] || [ "$HOUR" -eq 7 ]; then
            python scripts/main.py 저녁 $WEBHOOK_URL
          fi