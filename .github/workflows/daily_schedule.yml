name: Daily Meal Schedule

on:
  schedule:
    # KST 오전 09:30 -> UTC 당일 00:30
    # 깃허브 자체의 1시간 내외 지연을 감안하여 오전 10:30 부근에 도착하도록 설정
    - cron: '30 0 * * *'
  workflow_dispatch: # 수동 실행 버튼 유지

jobs:
  send-daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pytz

      - name: Run Scraper
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }} 
        run: |
          python scripts/main.py daily $WEBHOOK_URL